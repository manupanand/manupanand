name: Metrics

on:
  schedule:
    - cron: "0 0 * * 0"   # runs weekly every Sunday at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab
  push:
    branches: [main]        # also runs on every push to main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit generated SVGs back to repo

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manupanand
          template: classic
          filename: metrics.svg                  # output file committed to repo

          # Base sections
          base: header, activity, community, repositories, metadata

          # Language stats — reads from all your repos
          plugin_languages: yes
          plugin_languages_limit: 20
          plugin_languages_threshold: 0%
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used

          # Contribution streak
          plugin_streak: yes

          # Activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          # Repository highlights
          plugin_repositories: yes
          plugin_repositories_featured: >-
            manupanand-freelance-developer/mlops-pipeline-prjt-20-2025,
            blp-infra/gcp-infra-terraform,
            manupanand-freelance-developer/kubernetes-cluster-selfmanged

          # Achievements/highlights
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

          # Topics / interests
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: mastered

          # Star history
          plugin_stars: yes
          plugin_stars_limit: 4

          # Intro / profile details
          plugin_introduction: yes
          plugin_introduction_title: yes

          # Output config
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"
          output_action: commit
