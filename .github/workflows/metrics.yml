name: Metrics

on:
  schedule:
    - cron: "0 0 * * 0"   # runs weekly every Sunday at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab
  push:
    branches: [main]        # also runs on every push to main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # 1. GitHub Stats (commits, PRs, stars, issues)
      - name: Generate GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manupanand
          template: classic
          filename: metrics-stats.svg
          base: header, activity, community
          base_indepth: yes
          plugin_achievements: no
          plugin_topics: no
          plugin_stars: no
          plugin_repositories: no
          plugin_introduction: no
          plugin_activity: no
          plugin_streak: yes

      # 2. Language pie chart only
      - name: Generate Language Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manupanand
          template: classic
          filename: metrics-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 15
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
